name: Update Currency Data

on:
  schedule:
    # Run every Saturday at 0:12
    - cron: "12 0 * * *"
    #- cron: "12 0 * * 6"
  push:
    branches: [ master ]

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Update currency data
        run: go run cmd/nbp/main.go update

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add pkg/data/a/*.csv
          git commit -m "Update currency data [skip ci]" || echo "No changes to commit"
          git push origin master
